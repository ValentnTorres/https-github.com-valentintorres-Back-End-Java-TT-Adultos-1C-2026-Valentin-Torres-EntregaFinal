# Nombre de la aplicacion (aparece en los logs al arrancar).
spring.application.name=gestor-tareas

# --- Conexion a la base de datos MySQL ---
# En local: crear la base "gestor_tareas" en MySQL (o dejar que se cree
# sola) y usar los valores por defecto (root sin contraseña, localhost).
# En produccion (Render + un MySQL externo, ej. Clever Cloud): se
# setean MYSQLHOST/MYSQLPORT/MYSQLUSER/MYSQLPASSWORD/MYSQLDATABASE como
# variables de entorno del servicio, con esos nombres exactos, asi que
# no hace falta tocar nada aca: los ${...:valor-por-defecto} las leen
# solas si existen, y si no, usan el valor de desarrollo local.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:gestor_tareas}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Los planes gratuitos de MySQL externo (ej. Clever Cloud "Dev") suelen
# limitar la cantidad de conexiones concurrentes (ese plan, a 5). El
# pool de conexiones de Spring Boot (HikariCP) abre 10 por defecto, asi
# que sin esto el arranque explota con "max_user_connections" apenas
# Hibernate intenta abrir la conexion para crear/actualizar las tablas.
# Se deja bajo y con margen (el limite real puede variar segun el
# proveedor elegido).
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=2

# --- Configuracion de JPA / Hibernate ---
# "update": Hibernate crea o actualiza las tablas automaticamente segun
# las entidades, sin borrar datos existentes. Comodo para desarrollo;
# en un proyecto real se usarian migraciones (Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update
# Muestra por consola el SQL que genera Hibernate, util para entender
# que esta pasando "atras" de cada endpoint mientras se aprende.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Puerto donde levanta el backend (el frontend le apunta a este puerto).
# En produccion el puerto real lo asigna la plataforma (Render) en la
# variable PORT (distinta en cada deploy); en local, sin esa variable,
# sigue siendo 8080.
server.port=${PORT:8080}

# --- Autenticacion JWT ---
# Clave de firma HMAC para los tokens (JwtUtil). En local usa el valor de
# siempre; en produccion conviene pisarla con una variable de entorno
# propia (JWT_SECRET) en vez de depender de la que quedo commiteada en
# el repo.
jwt.secret=${JWT_SECRET:bp5bvDKVsQnzrqqM++4rCUyE9/2Tm7C0K++e9RD3ky10OyoDUHB/O+S3BmB+6ZYm}
# Duracion del token: 24hs en milisegundos.
jwt.expiration-ms=86400000

# --- CORS ---
# URL publica del frontend en produccion (ver CorsConfig.java). En local
# no hace falta definirla: CorsConfig ya permite localhost:5173 siempre.
frontend.url=${FRONTEND_URL:}
