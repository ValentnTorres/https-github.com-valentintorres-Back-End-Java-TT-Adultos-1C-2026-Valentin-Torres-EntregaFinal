# Nombre de la aplicacion (aparece en los logs al arrancar).
spring.application.name=gestor-tareas

# --- Conexion a la base de datos MySQL ---
# Antes de correr el backend hay que crear la base "gestor_tareas" en MySQL:
#   CREATE DATABASE gestor_tareas;
# Si tu usuario/contraseña de MySQL es distinto, cambialo aca abajo.
spring.datasource.url=jdbc:mysql://localhost:3306/gestor_tareas?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Configuracion de JPA / Hibernate ---
# "update": Hibernate crea o actualiza las tablas automaticamente segun
# las entidades, sin borrar datos existentes. Comodo para desarrollo;
# en un proyecto real se usarian migraciones (Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update
# Muestra por consola el SQL que genera Hibernate, util para entender
# que esta pasando "atras" de cada endpoint mientras se aprende.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Puerto donde levanta el backend (el frontend le apunta a este puerto).
server.port=8080
